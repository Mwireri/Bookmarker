<!-- Logout Confirmation Modal -->
<div id="logout-modal" class="fixed inset-0 z-50 hidden">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black/50 transition-opacity" onclick="closeLogoutModal()"></div>
  
  <!-- Modal -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="relative bg-gradient-to-br from-teal-50 to-teal-100 rounded-2xl shadow-xl max-w-sm w-full p-6 transform transition-all border border-teal-200">
      <!-- Content -->
      <h3 class="text-xl font-bold text-gray-900 text-center mb-2">Log out of ImageMark?</h3>
      <p class="text-sm text-gray-600 text-center mb-6">
        You'll need to log in again to access your bookmarks and collections.
      </p>
      
      <!-- Actions -->
      <div class="flex gap-3">
        <button type="button" onclick="closeLogoutModal()"
          class="flex-1 px-4 py-3 text-gray-700 bg-white rounded-xl font-medium hover:bg-gray-50 transition-colors border border-gray-200 shadow-sm">
          Cancel
        </button>
        <form method="post" action="{% url 'logout' %}" class="flex-1">
          {% csrf_token %}
          <button type="submit"
            class="w-full px-4 py-3 text-white bg-red-500 rounded-xl font-medium hover:bg-red-600 transition-colors shadow-sm">
            Log out
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function openLogoutModal() {
    const modal = document.getElementById('logout-modal');
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    // Focus trap for accessibility
    modal.querySelector('button').focus();
  }
  
  function closeLogoutModal() {
    const modal = document.getElementById('logout-modal');
    modal.classList.add('hidden');
    document.body.style.overflow = '';
  }
  
  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeLogoutModal();
    }
  });
</script>
