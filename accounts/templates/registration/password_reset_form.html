{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reset Password | ImageMark</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8">

    <div class="text-center mb-6">
      <div class="text-2xl font-bold text-teal-800">Image<span class="text-teal-600">Mark</span></div>
      <p class="text-gray-500 mt-1">Reset your password</p>
    </div>

    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input id="id_email" name="email" type="email" required
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-600 focus:outline-none text-gray-900"
          placeholder="Enter your account email">
        {% if form.email.errors %}
          <p class="text-red-600 text-sm mt-1">
            {% for e in form.email.errors %}{{ e }}{% if not forloop.last %}<br>{% endif %}{% endfor %}
          </p>
        {% endif %}
      </div>
      <button type="submit" class="w-full bg-teal-600 text-white py-3 rounded-xl font-semibold hover:bg-teal-700 transition-smooth">
        Send password reset link
      </button>
    </form>

  </div>
</body>
</html>
