{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Changed | ImageMark</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
  <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8 text-center">

    <!-- Branding -->
    <div class="mb-6">
      <div class="text-2xl font-bold text-teal-800">Image<span class="text-teal-600">Mark</span></div>
      <p class="text-gray-500 mt-1">Password updated successfully</p>
    </div>

    <!-- Success message -->
    <div class="p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg mb-6 text-sm">
      <span class="material-icons-outlined align-middle mr-1">check_circle</span>
      Your password has been changed.
    </div>

    <!-- Action buttons -->
    <div class="space-y-3">
      <a href="{% url 'settings_security' %}"
        class="block w-full bg-teal-600 text-white py-3 rounded-xl font-semibold hover:bg-teal-700 transition-smooth">
        Back to Security Settings
      </a>
      <a href="{% url 'home' %}"
        class="block w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-200 transition-smooth">
        Go to Dashboard
      </a>
    </div>

  </div>

</body>

</html>
